<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cacheta - Sistema de Marcação | King Jogos</title>
<meta name="description" content="Sistema de marcacao do jogo Cacheta. Controle pontuacao, rodadas e ranking em tempo real.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://kingjogos.com.br/cacheta/">

<!-- Open Graph -->
<meta property="og:title" content="Cacheta - Sistema de Marcação">
<meta property="og:description" content="Controle a pontuacao do Cacheta com ranking em tempo real na TV!">
<meta property="og:url" content="https://kingjogos.com.br/cacheta/">
<meta property="og:site_name" content="King Jogos">
<meta property="og:type" content="website">
<meta property="og:locale" content="pt_BR">

<!-- Favicon SVG inline -->
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230f1923'/><text x='50' y='68' font-size='55' text-anchor='middle' fill='%23f59e0b' font-family='sans-serif' font-weight='bold'>C</text></svg>">

<!-- Theme color for mobile browsers -->
<meta name="theme-color" content="#0f1923">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
  :root {
    --bg: #0f1923;
    --card: #1a2733;
    --accent: #f59e0b;
    --accent2: #ef4444;
    --green: #22c55e;
    --text: #e2e8f0;
    --muted: #64748b;
    --border: #334155;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-tap-highlight-color: transparent;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  .host-container {
    max-width: 900px;
    margin: 0 auto;
    padding: 16px;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 20px 0 16px;
    border-bottom: 2px solid var(--accent);
    margin-bottom: 20px;
  }
  .header .logo {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 4px;
  }
  .header .logo svg { width: 42px; height: 42px; }
  .header h1 {
    font-size: 2rem;
    color: var(--accent);
    letter-spacing: 3px;
  }
  .header .subtitle {
    color: var(--muted);
    font-size: 0.85rem;
    margin-top: 4px;
  }
  .header .brand {
    color: var(--muted);
    font-size: 0.75rem;
    margin-top: 8px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .header .brand a { color: var(--muted); }
  .header .brand a:hover { color: var(--accent); text-decoration: none; }

  /* Sections */
  .section {
    background: var(--card);
    border-radius: 12px;
    padding: 18px;
    margin-bottom: 16px;
    border: 1px solid var(--border);
  }
  .section h2 {
    font-size: 1.05rem;
    color: var(--accent);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  /* Forms */
  .setup-row {
    display: flex;
    gap: 10px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  input[type="text"] {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 14px;
    border-radius: 8px;
    font-size: 1rem;
    flex: 1;
    min-width: 160px;
  }
  input[type="text"]:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(245,158,11,0.15);
  }

  /* Buttons */
  button {
    padding: 10px 20px;
    border-radius: 8px;
    border: none;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    touch-action: manipulation;
  }
  button:hover { transform: translateY(-1px); filter: brightness(1.1); }
  button:active { transform: translateY(0); filter: brightness(0.95); }
  button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; filter: none; }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-danger { background: var(--accent2); color: #fff; }
  .btn-success { background: var(--green); color: #000; }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
  .btn-sm { padding: 6px 14px; font-size: 0.85rem; }

  /* Player list */
  .player-list { display: flex; flex-direction: column; gap: 6px; }
  .player-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--bg);
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    transition: opacity 0.3s;
  }
  .player-item.eliminated { opacity: 0.35; }
  .player-item .pos { color: var(--muted); min-width: 28px; font-weight: 700; font-size: 0.9rem; }
  .player-item .name { flex: 1; font-weight: 600; font-size: 0.95rem; }
  .player-item .pts {
    font-size: 1.2rem; font-weight: 700; color: var(--accent);
    min-width: 50px; text-align: center;
  }
  .player-item .pts.low { color: var(--accent2); }
  .player-item .pts.out { color: var(--accent2); font-size: 0.85rem; }
  .player-item .remove-btn {
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 1.2rem; padding: 0 4px; line-height: 1;
  }
  .player-item .remove-btn:hover { color: var(--accent2); transform: none; }

  /* Match selectors */
  .match-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 8px;
    margin-bottom: 14px;
  }
  .match-btn {
    padding: 14px 10px;
    border-radius: 10px;
    border: 2px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    font-weight: 500;
  }
  .match-btn.selected {
    border-color: var(--accent);
    background: rgba(245,158,11,0.12);
    color: var(--accent);
    font-weight: 700;
  }
  .match-btn.winner {
    border-color: var(--green);
    background: rgba(34,197,94,0.15);
    color: var(--green);
    font-weight: 700;
  }

  .match-actions { display: flex; gap: 8px; flex-wrap: wrap; }

  /* Phase badge */
  .phase {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 600;
  }
  .phase-select { background: rgba(245,158,11,0.15); color: var(--accent); }
  .phase-winner { background: rgba(34,197,94,0.15); color: var(--green); }

  /* Single-player round */
  .solo-round {
    text-align: center;
    padding: 20px 10px;
  }
  .solo-round p { margin-bottom: 14px; line-height: 1.5; }
  .solo-round .solo-name { color: var(--accent); font-weight: 700; }

  /* History */
  .history-item {
    background: var(--bg);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 6px;
    border: 1px solid var(--border);
    font-size: 0.85rem;
    line-height: 1.6;
  }
  .history-item .r { color: var(--accent); font-weight: 700; }
  .history-item .w { color: var(--green); font-weight: 600; }
  .history-item .l { color: var(--accent2); }
  .history-item .a { color: var(--muted); }
  .history-item .e { color: var(--accent2); font-weight: 700; }

  /* TV link */
  .tv-box {
    background: var(--bg);
    border: 1px dashed var(--accent);
    border-radius: 10px;
    padding: 16px;
    text-align: center;
  }
  .tv-box .tv-url {
    font-size: 1.1rem;
    color: var(--accent);
    font-weight: 700;
    display: block;
    margin-bottom: 6px;
  }
  .tv-box .tv-hint { color: var(--muted); font-size: 0.8rem; }
  .tv-box .tv-actions { margin-top: 12px; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }

  /* Game over */
  .gameover {
    text-align: center;
    padding: 30px 20px;
    background: linear-gradient(135deg, rgba(245,158,11,0.15), rgba(34,197,94,0.15));
    border-radius: 14px;
    margin-bottom: 16px;
  }
  .gameover h2 { font-size: 1.8rem; color: var(--accent); justify-content: center; }
  .gameover .champ { font-size: 1.4rem; color: var(--green); margin-top: 8px; font-weight: 700; }

  .empty { text-align: center; padding: 30px; color: var(--muted); }

  .footer {
    text-align: center;
    padding: 20px 0;
    color: var(--muted);
    font-size: 0.75rem;
  }
  .footer a { color: var(--muted); }
  .footer a:hover { color: var(--accent); }

  @media (max-width: 480px) {
    .match-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
    .header h1 { font-size: 1.6rem; }
  }
</style>
</head>
<body>

<div id="app"></div>

<script>
// ===== CONFIG =====
const STORAGE_KEY = 'cachetao_v2';
const CHANNEL_NAME = 'cachetao_sync_v2';
const TV_URL = '/cacheta/tv/';
const SITE_URL = 'https://kingjogos.com.br';
const INITIAL_POINTS = 10;

let bc;
try { bc = new BroadcastChannel(CHANNEL_NAME); } catch(e) {}

// ===== STATE =====
let state = loadState() || freshState();
let match = { phase: 'select', selected: new Set(), winner: null };

function freshState() {
  return {
    players: [], round: 0, history: [],
    started: false, over: false, champion: null
  };
}
function loadState() {
  try { const s = localStorage.getItem(STORAGE_KEY); return s ? JSON.parse(s) : null; }
  catch(e) { return null; }
}
function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  if (bc) bc.postMessage({ type: 'sync', state });
}
if (bc) {
  bc.onmessage = e => { if (e.data.type === 'sync') { state = e.data.state; render(); } };
}

// ===== HELPERS =====
const active = () => state.players.filter(p => p.points > 0);
const sorted = () => [...state.players].sort((a, b) => b.points - a.points || a.name.localeCompare(b.name));
const esc = s => s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

// ===== ACTIONS =====
function addPlayer() {
  const inp = document.getElementById('pname');
  const name = inp.value.trim();
  if (!name) return;
  if (state.players.length >= 11) return alert('Maximo 11 jogadores!');
  if (state.players.some(p => p.name.toLowerCase() === name.toLowerCase())) return alert('Nome ja existe!');
  state.players.push({ name, points: INITIAL_POINTS });
  inp.value = '';
  save(); render();
}

function removePlayer(i) { state.players.splice(i, 1); save(); render(); }

function startGame() {
  if (state.players.length < 2) return alert('Minimo 2 jogadores!');
  state.started = true; save(); render();
}

function toggle(name) {
  match.selected.has(name) ? match.selected.delete(name) : match.selected.add(name);
  render();
}
function selAll() { active().forEach(p => match.selected.add(p.name)); render(); }
function selClear() { match.selected.clear(); render(); }

function confirmSel() {
  if (match.selected.size < 1) return;
  match.phase = 'winner';
  if (match.selected.size === 1) match.winner = [...match.selected][0];
  render();
}

function pickWinner(name) { match.winner = name; render(); }
function backSel() { match.phase = 'select'; match.winner = null; render(); }

function finishRound(winner) {
  if (!winner) return;
  state.round++;
  const playing = new Set(match.selected);
  const ap = active();
  const losers = [], absent = [], elim = [];

  ap.forEach(p => {
    if (p.name === winner) return;
    if (playing.has(p.name)) { p.points -= 2; losers.push(p.name); }
    else { p.points -= 1; absent.push(p.name); }
    if (p.points <= 0) { p.points = 0; elim.push(p.name); }
  });

  state.history.push({ round: state.round, winner, players: [...playing], losers, absent, eliminated: elim });

  const still = active();
  if (still.length <= 1) {
    state.over = true;
    state.champion = still.length === 1 ? still[0].name : winner;
  }
  match = { phase: 'select', selected: new Set(), winner: null };
  save(); render();
}

function resetGame() {
  state = freshState();
  match = { phase: 'select', selected: new Set(), winner: null };
  save(); render();
}

function openTV() { window.open(TV_URL, '_blank'); }
function copyTV() {
  navigator.clipboard.writeText(SITE_URL + TV_URL).then(() => {
    const btn = document.getElementById('copyBtn');
    if (btn) { btn.textContent = 'Copiado!'; setTimeout(() => { btn.textContent = 'Copiar Link'; }, 1500); }
  });
}

// ===== RENDER =====
function render() {
  const ap = active();
  const sp = sorted();
  let h = '<div class="host-container">';

  // Header
  h += `<div class="header">
    <div class="logo">
      <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="100" height="100" rx="20" fill="#1a2733"/>
        <rect x="4" y="4" width="92" height="92" rx="17" fill="none" stroke="#f59e0b" stroke-width="3"/>
        <text x="50" y="70" font-size="58" text-anchor="middle" fill="#f59e0b" font-family="sans-serif" font-weight="bold">C</text>
      </svg>
      <h1>CACHETA</h1>
    </div>
    <div class="subtitle">${state.started ? `Rodada ${state.round}` : 'Sistema de Marcação'}</div>
    <div class="brand"><a href="${SITE_URL}" target="_blank">kingjogos.com.br</a></div>
  </div>`;

  // === GAME OVER ===
  if (state.over) {
    h += `<div class="gameover"><h2>FIM DE JOGO!</h2><div class="champ">Campeao: ${esc(state.champion)}</div></div>`;
    h += renderScoreboard(sp, false);
    h += renderHistory();
    h += `<div class="section" style="text-align:center">
      <button class="btn-danger" onclick="resetGame()">Novo Jogo</button></div>`;
    h += renderFooter();
    h += '</div>';
    document.getElementById('app').innerHTML = h;
    return;
  }

  // === SETUP ===
  if (!state.started) {
    h += `<div class="section">
      <h2>Jogadores (${state.players.length}/11)</h2>
      <div class="setup-row">
        <input type="text" id="pname" placeholder="Nome do jogador" maxlength="20" autocomplete="off"
          onkeydown="if(event.key==='Enter'){event.preventDefault();addPlayer();}">
        <button class="btn-primary" onclick="addPlayer()">Adicionar</button>
      </div>
      <div class="player-list">
        ${state.players.length === 0 ? '<div class="empty">Adicione de 2 a 11 jogadores para comecar</div>' : ''}
        ${state.players.map((p, i) => `
          <div class="player-item">
            <span class="name">${esc(p.name)}</span>
            <span class="pts">${p.points}</span>
            <button class="remove-btn" onclick="removePlayer(${i})" title="Remover">&times;</button>
          </div>`).join('')}
      </div>
    </div>`;

    if (state.players.length >= 2) {
      h += `<div class="section" style="text-align:center">
        <button class="btn-success" style="font-size:1.05rem;padding:14px 36px;" onclick="startGame()">
          Iniciar Jogo com ${state.players.length} Jogadores
        </button>
      </div>`;
    }

    h += renderFooter();
    h += '</div>';
    document.getElementById('app').innerHTML = h;
    const inp = document.getElementById('pname'); if (inp) inp.focus();
    return;
  }

  // === GAME IN PROGRESS ===
  // Scoreboard
  h += renderScoreboard(sp, true);

  // Match
  if (ap.length >= 1) {
    const phaseBadge = match.phase === 'select'
      ? '<span class="phase phase-select">Selecione jogadores</span>'
      : '<span class="phase phase-winner">Quem bateu?</span>';

    h += `<div class="section"><h2>Rodada ${state.round + 1} ${phaseBadge}</h2>`;

    if (match.phase === 'select') {
      h += `<div class="match-grid">
        ${ap.map(p => `<button class="match-btn ${match.selected.has(p.name)?'selected':''}"
          onclick="toggle('${esc(p.name)}')">${esc(p.name)}<br><small style="opacity:0.7">${p.points} pts</small></button>`).join('')}
      </div>
      <div class="match-actions">
        <button class="btn-primary" onclick="confirmSel()" ${match.selected.size<1?'disabled':''}>
          Confirmar (${match.selected.size})</button>
        <button class="btn-outline btn-sm" onclick="selAll()">Todos</button>
        <button class="btn-outline btn-sm" onclick="selClear()">Limpar</button>
      </div>`;
    } else {
      const sel = [...match.selected];
      if (sel.length === 1) {
        h += `<div class="solo-round">
          <p>Apenas <span class="solo-name">${esc(sel[0])}</span> jogou esta rodada.</p>
          <p style="color:var(--muted);font-size:0.9rem">${esc(sel[0])} mantem os pontos. Demais perdem 1 ponto.</p>
          <div style="margin-top:16px;display:flex;gap:8px;justify-content:center">
            <button class="btn-success" onclick="finishRound('${esc(sel[0])}')">Confirmar</button>
            <button class="btn-outline btn-sm" onclick="backSel()">Voltar</button>
          </div>
        </div>`;
      } else {
        h += `<p style="color:var(--muted);margin-bottom:10px;font-size:0.9rem">Quem bateu (ganhou) a partida?</p>
        <div class="match-grid">
          ${sel.map(n => `<button class="match-btn ${match.winner===n?'winner':''}"
            onclick="pickWinner('${esc(n)}')">${esc(n)}</button>`).join('')}
        </div>
        <div class="match-actions">
          <button class="btn-success" onclick="finishRound(match.winner)" ${!match.winner?'disabled':''}>Confirmar Resultado</button>
          <button class="btn-outline btn-sm" onclick="backSel()">Voltar</button>
        </div>`;
      }
    }
    h += '</div>';
  }

  // History
  h += renderHistory();

  // TV
  h += `<div class="section">
    <h2>Tela da TV</h2>
    <div class="tv-box">
      <span class="tv-url">kingjogos.com.br/cacheta/tv</span>
      <span class="tv-hint">Abra no navegador da Smart TV ou transmita uma aba do Chrome</span>
      <div class="tv-actions">
        <button class="btn-primary btn-sm" onclick="openTV()">Abrir TV</button>
        <button class="btn-outline btn-sm" id="copyBtn" onclick="copyTV()">Copiar Link</button>
      </div>
    </div>
  </div>`;

  // Reset
  h += `<div class="section" style="text-align:center">
    <button class="btn-outline btn-sm" onclick="if(confirm('Reiniciar jogo? Todo progresso sera perdido.'))resetGame()">Reiniciar Jogo</button>
  </div>`;

  h += renderFooter();
  h += '</div>';
  document.getElementById('app').innerHTML = h;
}

function renderScoreboard(sp, showPos) {
  return `<div class="section"><h2>Placar</h2><div class="player-list">
    ${sp.map((p, i) => {
      const elim = p.points <= 0;
      return `<div class="player-item ${elim?'eliminated':''}">
        ${showPos ? `<span class="pos">${i+1}.</span>` : ''}
        <span class="name">${esc(p.name)}</span>
        <span class="pts ${elim?'out':p.points<=2?'low':''}">${elim?'FORA':p.points}</span>
      </div>`;
    }).join('')}
  </div></div>`;
}

function renderHistory() {
  if (!state.history.length) return '';
  let h = '<div class="section"><h2>Historico</h2>';
  for (let i = state.history.length - 1; i >= 0; i--) {
    const r = state.history[i];
    h += `<div class="history-item">
      <span class="r">R${r.round}</span>
      <span class="w"> ${esc(r.winner)} bateu</span>`;
    if (r.losers.length) h += ` <span class="l">| Perderam: ${r.losers.map(esc).join(', ')}</span>`;
    if (r.absent.length) h += ` <span class="a">| Fora: ${r.absent.map(esc).join(', ')}</span>`;
    if (r.eliminated.length) h += ` <span class="e">| Eliminados: ${r.eliminated.map(esc).join(', ')}</span>`;
    h += '</div>';
  }
  return h + '</div>';
}

function renderFooter() {
  return `<div class="footer"><a href="${SITE_URL}" target="_blank">kingjogos.com.br</a></div>`;
}

render();
</script>
</body>
</html>
