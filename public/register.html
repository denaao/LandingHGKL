<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inscricao — HGKL</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --yellow: #f5c800; --bg: #111; --text: #eee; --text-muted: #aaa; --green: #27ae60; --red: #e74c3c; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem; }
    .register-box { width: 100%; max-width: 500px; }
    h1 { font-family: 'Oswald', sans-serif; font-size: 1.8rem; color: var(--yellow); text-align: center; margin-bottom: .3rem; }
    .subtitle { color: var(--text-muted); text-align: center; font-size: .9rem; margin-bottom: .5rem; }
    .etapa-info { text-align: center; color: var(--yellow); font-family: 'Oswald', sans-serif; font-size: 1.1rem; margin-bottom: 2rem; }
    .form-card {
      background: #1a1a1a; border-radius: 12px;
      border: 1px solid rgba(245,200,0,.2);
      padding: 1.5rem;
    }
    .player-input {
      display: flex; align-items: center; gap: .75rem;
      margin-bottom: .75rem;
    }
    .player-num {
      font-family: 'Oswald', sans-serif; font-size: 1rem;
      color: var(--yellow); font-weight: 700; width: 1.5rem; text-align: center;
    }
    .player-input input {
      flex: 1; padding: .65rem; background: var(--bg);
      border: 1px solid rgba(255,255,255,.1); border-radius: 6px;
      color: var(--text); font-size: .9rem;
    }
    .player-input input:focus { outline: none; border-color: var(--yellow); }
    .submit-btn {
      width: 100%; padding: .8rem; margin-top: 1rem;
      background: var(--yellow); color: #111; border: none;
      border-radius: 6px; font-family: 'Oswald', sans-serif;
      font-size: 1rem; font-weight: 600; cursor: pointer;
      letter-spacing: 1px; text-transform: uppercase;
    }
    .submit-btn:hover { background: #e0b800; }
    .submit-btn:disabled { opacity: .5; cursor: not-allowed; }
    .msg { text-align: center; margin-top: 1rem; font-size: .85rem; }
    .msg.success { color: var(--green); }
    .msg.error { color: var(--red); }
    .back-link { margin-top: 2rem; color: var(--yellow); text-decoration: none; font-size: .85rem; }
    .back-link:hover { text-decoration: underline; }
    .closed-msg {
      text-align: center; padding: 3rem; color: var(--text-muted);
      font-size: 1.1rem;
    }
  </style>
</head>
<body>
  <div class="register-box">
    <h1>Inscricao de Equipe</h1>
    <div class="subtitle" id="teamName"></div>
    <div class="etapa-info" id="etapaInfo"></div>
    <div id="content">
      <p style="color:var(--text-muted);text-align:center;">Carregando...</p>
    </div>
  </div>
  <a href="/" class="back-link">&larr; Voltar ao site</a>

  <script>
    const token = new URLSearchParams(window.location.search).get('token');
    const content = document.getElementById('content');

    async function fetchRegisterEndpoint(tokenValue, options = {}) {
      let res = await fetch(`/register/${tokenValue}`, options);
      if (res.status === 404) {
        res = await fetch(`/api/register/${tokenValue}`, options);
      }
      return res;
    }

    if (!token) {
      content.innerHTML = '<p class="closed-msg">Link invalido.</p>';
    } else {
      loadTeam();
    }

    async function loadTeam() {
      const res = await fetchRegisterEndpoint(token);
      if (!res.ok) {
        content.innerHTML = '<p class="closed-msg">Link invalido ou expirado.</p>';
        return;
      }
      const data = await res.json();
      document.getElementById('teamName').textContent = data.nome;
      document.getElementById('etapaInfo').textContent = data.etapa_nome;

      if (data.etapa_status !== 'registration') {
        content.innerHTML = '<p class="closed-msg">Inscricoes encerradas para esta etapa.</p>';
        return;
      }

      const existingPlayers = data.players || [];
      let html = '<form id="registerForm" class="form-card">';
      for (let i = 0; i < 8; i++) {
        const value = existingPlayers[i] ? existingPlayers[i].nome : '';
        html += `
          <div class="player-input">
            <span class="player-num">${i + 1}</span>
            <input type="text" name="player_${i}" placeholder="Nome do jogador ${i + 1}" value="${value}" required />
          </div>
        `;
      }
      html += '<button type="submit" class="submit-btn">Confirmar Inscricao</button>';
      html += '<div class="msg" id="msg"></div>';
      html += '</form>';
      content.innerHTML = html;

      document.getElementById('registerForm').addEventListener('submit', submitRegistration);
    }

    async function submitRegistration(e) {
      e.preventDefault();
      const form = e.target;
      const players = [];
      for (let i = 0; i < 8; i++) {
        players.push(form[`player_${i}`].value.trim());
      }

      const msg = document.getElementById('msg');
      const btn = form.querySelector('.submit-btn');
      btn.disabled = true;

      const res = await fetchRegisterEndpoint(token, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ players })
      });

      if (res.ok) {
        msg.textContent = 'Inscricao confirmada!';
        msg.className = 'msg success';
      } else {
        const data = await res.json();
        msg.textContent = data.error || 'Erro ao enviar';
        msg.className = 'msg error';
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
